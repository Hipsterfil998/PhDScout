site_name: PhdScout
site_description: AI-powered academic job search agent
site_url: https://hipsterfil998.github.io/PhDScout
repo_url: https://github.com/Hipsterfil998/PhDScout
repo_name: Hipsterfil998/PhDScout

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - User Guide:
    - Using the Web UI: guide/web-ui.md
    - Using the CLI: guide/cli.md
    - Job Sources: guide/sources.md
  - Configuration: configuration.md
  - Architecture:
    - Overview: architecture/overview.md
    - Agent API: architecture/api.md
    - Adding a Scraper: architecture/scrapers.md
  - Deployment: deployment.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Hipsterfil998/PhDScout
    - icon: fontawesome/brands/python
      link: https://huggingface.co/spaces/HipFil98/PhDScout
